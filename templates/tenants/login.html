<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="card shadow-lg border-0" style="width: 24rem;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size: 2.5rem;"></i>
                <h2 class="h4 fw-bold mt-2 text-dark">Hệ thống SSL Zimbra</h2>
            </div>

            {% if error %}
            <div class="alert alert-danger small py-2">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Email</label>
                    <input type="email" name="email" required class="form-control" autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold small">Mật khẩu</label>
                    <input type="password" name="password" required class="form-control">
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Đăng nhập</button>
            </form>
        </div>
    </div>
</body>
</html>
