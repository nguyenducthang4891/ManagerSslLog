{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản trị hệ thống</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/bootstrap-icons.css' %}">
    <style>
        body {
            /* Màu nền xanh lam sáng theo đúng hình ảnh */
            background: radial-gradient(circle, #1572e8 0%, #0c56b3 100%);
            min-height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        .card {
            border-radius: 12px;
            max-width: 420px;
            width: 100%;
        }
        .icon-box {
            background-color: #188ecd;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
        }
        .input-group-text {
            background-color: #fff;
            border-right: none;
            color: #6c757d;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            border-color: #dee2e6;
            box-shadow: none;
        }
        .btn-login {
            background-color: #0f5ca8;
            border-color: #0f5ca8;
            padding: 10px;
            font-size: 0.95rem;
        }
        .btn-login:hover {
            background-color: #0c4b8a;
            border-color: #0c4b8a;
        }
        .text-muted-custom {
            color: rgba(140, 152, 165, 0.16);
            font-size: 0.8rem;
        }
        .password-toggle {
            background-color: #fff;
            border-left: none;
            color: #6c757d;
            cursor: pointer;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">

    <div class="text-center">
        {% if error %}
        <div class="alert alert-danger py-2 px-4 shadow-sm border-0 mb-3 mx-auto small text-danger" style="border-radius: 6px; background-color: #fce8e6; max-width: 420px;">
            Error: {{ error }}
        </div>
        {% endif %}

        <div class="card shadow border-0">
            <div class="card-body p-5">
                <div class="text-center">
                    <div class="icon-box">
                        <i class="bi bi-house-door-fill"></i>
                    </div>
                    <h2 class="h4 fw-bold text-dark mb-1">Quản trị hệ thống Email</h2>
                    <p class="text-muted small mb-4">Đăng nhập để tiếp tục</p>
                </div>

                <form method="POST" class="text-start">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label text-secondary fw-semibold small mb-1">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" required class="form-control" placeholder="email@example.com" autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary fw-semibold small mb-1">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" required class="form-control" placeholder="Nhập mật khẩu">
                            <span class="input-group-text password-toggle"><i class="bi bi-eye"></i></span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-login w-100 fw-bold d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted-custom">© 2025 Hệ thống quản trị Email</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
